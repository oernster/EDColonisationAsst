[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = 
    -v
    --cov=src
    --cov-report=html
    --cov-report=term-missing

# Ensure pytest's cache is written to a writable location.
# This avoids PytestCacheWarning on Windows when the repo root is locked down.
cache_dir = .pytest_cache
asyncio_mode = auto
