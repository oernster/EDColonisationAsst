[pytest]
# Repo-root pytest configuration.
#
# This exists so running `pytest` from the project root (common in VS Code / CI)
# uses a writable cache directory and the backend test suite by default.
testpaths = backend/tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Store pytest cache under backend/ to avoid permission issues writing
# <repo>/.pytest_cache on some Windows setups.
cache_dir = backend/.pytest_cache
